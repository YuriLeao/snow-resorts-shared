name: Publish shared libs

# Publishes com.snowresorts:security-lib and :contracts to GitHub Packages.
# Trigger by pushing a semver tag, e.g. `git tag v1.0.1 && git push origin v1.0.1`.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build & test
        run: ./mvnw -B -ntp verify

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Generates ~/.m2/settings.xml with a `github` server reading the env credentials below.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      # Align the artifact version with the pushed tag (strip the leading "v").
      - name: Set version from tag
        run: ./mvnw -B -ntp versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Publish to GitHub Packages
        run: ./mvnw -B -ntp -DskipTests deploy
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
